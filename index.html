<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orange Health Labs — Test Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --ground:#0D1F2D;--surface:#112638;--surface-2:#183248;
  --border:#1F3F5A;--border-2:#265070;
  --text:#F0F4F8;--text-2:#7FA8C4;--text-3:#4A7490;
  --accent:#FF6B00;--accent-h:#FF8C35;--accent-glow:rgba(255,107,0,0.18);
  --blr:#22C55E;--del:#3B82F6;--noi:#A855F7;--hyd:#F59E0B;--mum:#EC4899;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ground);color:var(--text);font-family:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;font-size:14px;line-height:1.5}

/* HEADER */
header{background:linear-gradient(135deg,#0A1A27 0%,#0D1F2D 60%,#0F2438 100%);border-bottom:1px solid var(--border);padding:28px 24px 0;position:sticky;top:0;z-index:100;box-shadow:0 4px 32px rgba(0,0,0,0.4)}
.header-top{display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto;padding-bottom:20px}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#FF3D00);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;box-shadow:0 0 20px var(--accent-glow);flex-shrink:0}
.brand-name{font-size:20px;font-weight:800;background:linear-gradient(90deg,#fff 0%,#c0d8ec 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.3px}
.brand-sub{font-size:11px;font-weight:500;color:var(--text-3);letter-spacing:1.5px;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;color:#22C55E;letter-spacing:0.5px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22C55E;animation:pulse 2s ease-in-out infinite}
.refresh-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;color:var(--text-2);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:all 0.15s}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}
.refresh-btn.spinning svg{animation:spin 0.8s linear infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* SEARCH */
.search-wrap{max-width:1200px;margin:0 auto;padding-bottom:16px}
.search-box{position:relative;display:flex;align-items:center}
.search-icon{position:absolute;left:16px;color:var(--text-3);pointer-events:none}
.search-input{width:100%;padding:14px 16px 14px 48px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;font-size:15px;font-weight:500;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
.search-input::placeholder{color:var(--text-3);font-weight:400}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.search-clear{position:absolute;right:14px;background:var(--surface-2);border:none;width:24px;height:24px;border-radius:50%;display:none;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);font-size:14px;transition:background 0.15s}
.search-clear:hover{background:var(--border-2)}
.search-clear.visible{display:flex}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;max-width:1200px;margin:0 auto;padding-bottom:18px}
.filter-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--text-2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;letter-spacing:0.3px}
.filter-btn:hover{border-color:var(--border-2);color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 12px var(--accent-glow)}
.city-btn.active-blr{background:var(--blr);border-color:var(--blr);color:#fff}
.city-btn.active-del{background:var(--del);border-color:var(--del);color:#fff}
.city-btn.active-noi{background:var(--noi);border-color:var(--noi);color:#fff}
.city-btn.active-hyd{background:var(--hyd);border-color:var(--hyd);color:#000}
.city-btn.active-mum{background:var(--mum);border-color:var(--mum);color:#fff}
.filter-divider{width:1px;height:20px;background:var(--border);flex-shrink:0}

/* STATS BAR */
.stats-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px}
.stats-inner{max-width:1200px;margin:0 auto;display:flex;gap:24px;align-items:center;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:8px}
.stat-num{font-size:16px;font-weight:800;color:var(--accent)}
.stat-label{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:1px}
.stat-divider{color:var(--border-2);font-size:16px}
.result-count{margin-left:auto;font-size:12px;font-weight:600;color:var(--text-3)}
.last-updated{font-size:11px;font-weight:500;color:var(--text-3);display:flex;align-items:center;gap:5px}

/* MAIN */
main{max-width:1200px;margin:0 auto;padding:20px 24px 60px}

/* LOADING */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:320px;gap:16px}
.loader-ring{width:44px;height:44px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin 0.8s linear infinite}
.loader-text{font-size:13px;font-weight:600;color:var(--text-2)}
.loader-sub{font-size:11px;color:var(--text-3)}

/* ERROR */
.error-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:320px;gap:12px;text-align:center;padding:20px}
.error-icon{font-size:40px;opacity:0.6}
.error-title{font-size:16px;font-weight:700;color:var(--text-2)}
.error-msg{font-size:12px;color:var(--text-3);max-width:440px;line-height:1.7}
.error-action{background:var(--accent);border:none;border-radius:8px;padding:9px 20px;color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px}
.error-action:hover{background:var(--accent-h)}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;color:var(--text-3)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.5}
.empty-title{font-size:18px;font-weight:700;color:var(--text-2);margin-bottom:8px}

/* CARDS */
.results-grid{display:flex;flex-direction:column;gap:10px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s;cursor:pointer}
.card:hover{border-color:var(--border-2);box-shadow:0 4px 24px rgba(0,0,0,0.25)}
.card.expanded{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 8px 32px rgba(255,107,0,0.12)}
.card-face{display:flex;align-items:center;gap:14px;padding:16px 18px}
.type-badge{flex-shrink:0;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.badge-test{background:rgba(59,130,246,0.15);color:#60A5FA;border:1px solid rgba(59,130,246,0.25)}
.badge-pkg{background:rgba(255,107,0,0.15);color:var(--accent-h);border:1px solid rgba(255,107,0,0.3)}
.card-main{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.card-name mark{background:rgba(255,107,0,0.25);color:var(--accent-h);border-radius:3px;padding:0 2px}
.card-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.meta-chip{font-size:11px;font-weight:500;color:var(--text-3);display:flex;align-items:center;gap:4px}
.card-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.card-price{text-align:right}
.price-from{font-size:10px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px}
.price-val{font-size:17px;font-weight:800;color:var(--text)}
.price-sym{font-size:12px;font-weight:600;color:var(--accent)}
.card-chevron{color:var(--text-3);font-size:16px;transition:transform 0.25s}
.card.expanded .card-chevron{transform:rotate(180deg)}

/* EXPANDED BODY */
.card-body{display:none;border-top:1px solid var(--border);padding:18px;background:var(--ground)}
.card.expanded .card-body{display:block}
.body-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:640px){.body-grid{grid-template-columns:1fr}}
.body-label{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.params-list{display:flex;flex-direction:column;gap:5px}
.param-item{font-size:12px;font-weight:500;color:var(--text-2);padding:5px 10px;background:var(--surface);border-radius:6px;border-left:2px solid var(--accent)}
.city-table{display:flex;flex-direction:column;gap:6px}
.city-row{display:flex;align-items:center;gap:10px;padding:7px 10px;background:var(--surface);border-radius:8px}
.city-tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;min-width:82px;text-align:center;flex-shrink:0}
.city-blr{background:rgba(34,197,94,0.15);color:var(--blr);border:1px solid rgba(34,197,94,0.25)}
.city-del{background:rgba(59,130,246,0.15);color:#60A5FA;border:1px solid rgba(59,130,246,0.25)}
.city-noi{background:rgba(168,85,247,0.15);color:#C084FC;border:1px solid rgba(168,85,247,0.25)}
.city-hyd{background:rgba(245,158,11,0.15);color:var(--hyd);border:1px solid rgba(245,158,11,0.25)}
.city-mum{background:rgba(236,72,153,0.15);color:#F472B6;border:1px solid rgba(236,72,153,0.25)}
.city-price{font-size:14px;font-weight:700;color:var(--text)}
.city-tat{font-size:11px;font-weight:500;color:var(--text-3);margin-left:auto}
.subtests-list{display:flex;flex-direction:column;gap:10px}
.subtest-name{font-size:12px;font-weight:700;color:var(--text-2);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.subtest-name::before{content:'';display:inline-block;width:3px;height:12px;border-radius:2px;background:var(--accent);flex-shrink:0}
.subtest-params{display:flex;flex-wrap:wrap;gap:4px}
.sparam{font-size:10px;font-weight:500;background:rgba(255,107,0,0.08);border:1px solid rgba(255,107,0,0.15);color:var(--text-3);border-radius:4px;padding:3px 7px}
.meta-row{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.meta-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--text-2)}
.meta-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cpill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.cpill-blr{background:rgba(34,197,94,0.15);color:var(--blr)}
.cpill-del{background:rgba(59,130,246,0.15);color:#60A5FA}
.cpill-noi{background:rgba(168,85,247,0.15);color:#C084FC}
.cpill-hyd{background:rgba(245,158,11,0.15);color:var(--hyd)}
.cpill-mum{background:rgba(236,72,153,0.15);color:#F472B6}
.city-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px}

/* SCROLL TOP */
.scroll-top{position:fixed;bottom:24px;right:24px;width:40px;height:40px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(255,107,0,0.4);transition:transform 0.2s;z-index:50}
.scroll-top:hover{transform:translateY(-2px)}
.scroll-top.visible{display:flex}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp 0.2s ease-out both}
@media(max-width:768px){header{padding:18px 14px 0}.header-top{flex-wrap:wrap;gap:10px}main{padding:16px 14px 40px}.stats-bar{padding:10px 14px}.filter-bar{padding:0 14px 14px}}
@media(prefers-reduced-motion:reduce){.card{animation:none}.live-dot{animation:none}.loader-ring{animation:none}}
</style>

<body>

<header>
  <div class="header-top">
    <div class="brand">
      <div class="brand-icon">O</div>
      <div>
        <div class="brand-name">Orange Health Labs</div>
        <div class="brand-sub">Test &amp; Package Catalog</div>
      </div>
    </div>
    <div class="header-right">
      <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
        Refresh
      </button>
      <div class="live-badge"><div class="live-dot"></div>Google Sheets</div>
    </div>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search tests, packages, parameters…" autocomplete="off" spellcheck="false">
      <button class="search-clear" id="searchClear">✕</button>
    </div>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" data-type="all">All</button>
    <button class="filter-btn" data-type="Test">Tests</button>
    <button class="filter-btn" data-type="Package">Packages</button>
    <div class="filter-divider"></div>
    <button class="filter-btn city-btn active" data-city="all">All Cities</button>
    <button class="filter-btn city-btn" data-city="Bangalore" data-cls="blr">Bangalore</button>
    <button class="filter-btn city-btn" data-city="Delhi" data-cls="del">Delhi</button>
    <button class="filter-btn city-btn" data-city="Noida" data-cls="noi">Noida</button>
    <button class="filter-btn city-btn" data-city="Hyderabad" data-cls="hyd">Hyderabad</button>
    <button class="filter-btn city-btn" data-city="Mumbai" data-cls="mum">Mumbai</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stats-inner">
    <div class="stat"><span class="stat-num" id="statTests">—</span><span class="stat-label">Tests</span></div>
    <span class="stat-divider">·</span>
    <div class="stat"><span class="stat-num" id="statPkgs">—</span><span class="stat-label">Packages</span></div>
    <span class="stat-divider">·</span>
    <div class="stat"><span class="stat-num">5</span><span class="stat-label">Cities</span></div>
    <span class="result-count" id="resultCount"></span>
    <span class="last-updated" id="lastUpdated"></span>
  </div>
</div>

<main>
  <div id="loadingState" class="loading-state">
    <div class="loader-ring"></div>
    <div class="loader-text">Loading catalog from Google Sheets…</div>
    <div class="loader-sub">Fetching live data</div>
  </div>
  <div id="errorState" class="error-state" style="display:none">
    <div class="error-icon">⚠️</div>
    <div class="error-title">Couldn't load data</div>
    <div class="error-msg" id="errorMsg"></div>
    <button class="error-action" onclick="refreshData()">Try again</button>
  </div>
  <div id="resultsGrid" class="results-grid" style="display:none"></div>
  <div id="emptyState" class="empty" style="display:none">
    <div class="empty-icon">🔬</div>
    <div class="empty-title">No results found</div>
    <div class="empty-sub">Try a different search term or clear the filters</div>
  </div>
</main>

<button class="scroll-top" id="scrollTop">↑</button>

<script>
const CSV_URL = './data.csv';
const KNOWN_CITIES = new Set(['Bangalore','Delhi','Noida','Hyderabad','Mumbai']);
const CITY_CLASS = {Bangalore:'blr',Delhi:'del',Noida:'noi',Hyderabad:'hyd',Mumbai:'mum'};

let DATA = [];
let query = '';
let typeFilter = 'all';
let cityFilter = 'all';

// ── CSV PARSER ────────────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuote) {
      if (ch === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (ch === '"') inQuote = false;
      else field += ch;
    } else {
      if (ch === '"') { inQuote = true; }
      else if (ch === ',') { row.push(field.trim()); field = ''; }
      else if (ch === '\n' || ch === '\r') {
        row.push(field.trim());
        if (row.some(f => f)) rows.push(row);
        row = []; field = '';
        if (ch === '\r' && text[i+1] === '\n') i++;
      } else { field += ch; }
    }
  }
  row.push(field.trim());
  if (row.some(f => f)) rows.push(row);
  return rows;
}

// ── DATA PROCESSOR ────────────────────────────────────────────────────────
function processRows(rows) {
  const tests = {};   // keyed by test name
  const packages = {};  // keyed by package name
  let section = null;

  // For packages section tracking
  let curPkg = null, curSub = null;

  for (const row of rows) {
    const r = row.map(c => (c||'').trim());
    if (r.every(c => !c)) continue;

    // Detect section headers
    if (r[0] === 'Type' && (r[1] || '').includes('Package')) { section = 'main'; continue; }
    if (r[0] === 'Package' && r[1] === 'Parameters')         { section = 'pkg';  curPkg = null; curSub = null; continue; }
    if (r[0] === 'Test'    && r[1] === 'Parameters')         { section = 'test2'; curPkg = null; curSub = null; continue; }
    // Skip markdown table divider rows
    if (r[0].startsWith(':-') || r[1] === ':-:') continue;

    // ── SECTION 1: main tests (Type | Name | Sub | Param | City | Price | TAT | Fast | Gender)
    if (section === 'main') {
      const [type, name, , param, city, price, tat, fast, gender] = r;
      if (type !== 'Test' || !name || !KNOWN_CITIES.has(city)) continue;
      if (!tests[name]) tests[name] = { type:'Test', name, params:[], cities:{}, fast:'No', gender:'both' };
      const t = tests[name];
      if (param && !t.params.includes(param)) t.params.push(param);
      t.cities[city] = { p: parseInt(price)||0, t: tat };
      if (fast)   t.fast   = fast;
      if (gender) t.gender = gender;
    }

    // ── SECTION 2: packages (Package | Sub-test | Param | Price | TAT)
    else if (section === 'pkg') {
      if (r[0]) curPkg = r[0];
      if (r[1]) curSub = r[1];
      if (!curPkg) continue;
      if (!packages[curPkg]) packages[curPkg] = { type:'Package', name:curPkg, price:0, cities:{}, subs:[], tats:[] };
      const pk = packages[curPkg];
      if (curSub) {
        let sub = pk.subs.find(s => s.name === curSub);
        if (!sub) { sub = { name:curSub, params:[] }; pk.subs.push(sub); }
        if (r[2] && !sub.params.includes(r[2])) sub.params.push(r[2]);
      }
      if (r[3] && !pk.price) pk.price = parseInt(r[3])||0;
      if (r[4] && !pk.tats.includes(r[4])) pk.tats.push(r[4]);
    }

    // ── SECTION 3: more tests (Name | Param-group | Param | Price | TAT)
    else if (section === 'test2') {
      if (r[0]) curPkg = r[0];
      if (!curPkg) continue;
      if (!tests[curPkg]) tests[curPkg] = { type:'Test', name:curPkg, params:[], cities:{}, fast:'No', gender:'both', tats:[] };
      const t = tests[curPkg];
      const p = r[2] || r[1];
      if (p && p !== curPkg && !t.params.includes(p)) t.params.push(p);
      if (r[3] && !t.price) t.price = parseInt(r[3])||0;
      if (r[4]) { if (!t.tats) t.tats = []; if (!t.tats.includes(r[4])) t.tats.push(r[4]); }
    }
  }

  const result = [];

  // Tests with city breakdown
  for (const t of Object.values(tests)) {
    if (Object.keys(t.cities).length > 0) { result.push(t); continue; }
    // Tests from section 3 without city data
    if (t.price || (t.tats && t.tats.length)) result.push(t);
  }

  // Packages
  for (const pk of Object.values(packages)) {
    result.push(pk);
  }

  return result;
}

// ── FETCH ─────────────────────────────────────────────────────────────────
async function loadData() {
  const resp = await fetch(CSV_URL + '?v=' + Date.now());
  if (!resp.ok) throw new Error(`Could not load data (${resp.status}). The catalog data may still be generating — wait 1 minute and try again.`);
  const text = await resp.text();
  const rows = parseCSV(text);
  return processRows(rows);
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function fmt(n) { return '₹' + (n||0).toLocaleString('en-IN'); }
function minPrice(item) {
  if (Object.keys(item.cities||{}).length) return Math.min(...Object.values(item.cities).map(c=>c.p));
  return item.price || 0;
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escRe(s)   { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function hl(text, q) {
  if (!q) return escHtml(text);
  return escHtml(text).replace(new RegExp('('+escRe(q)+')','gi'),'<mark>$1</mark>');
}
function genderLabel(g) {
  const m = {both:{c:'#60A5FA',l:'Both genders'},female:{c:'#F472B6',l:'Female'},male:{c:'#34D399',l:'Male'}};
  return m[g] || {c:'#8BAFC7',l:g||'Both'};
}

// ── FILTER ────────────────────────────────────────────────────────────────
function getFiltered() {
  const q2 = query.toLowerCase().trim();
  return DATA.filter(item => {
    if (typeFilter !== 'all' && item.type !== typeFilter) return false;
    if (cityFilter !== 'all' && !((item.cities||{})[cityFilter])) return false;
    if (!q2) return true;
    if (item.name.toLowerCase().includes(q2)) return true;
    if ((item.params||[]).some(p => p.toLowerCase().includes(q2))) return true;
    if ((item.subs||[]).some(s => s.name.toLowerCase().includes(q2) || s.params.some(p => p.toLowerCase().includes(q2)))) return true;
    return false;
  });
}

// ── CARD HTML ─────────────────────────────────────────────────────────────
function cityPills(cities) {
  return Object.keys(cities||{}).map(c => `<span class="cpill cpill-${CITY_CLASS[c]}">${c}</span>`).join('');
}

function cityTableHTML(cities) {
  const entries = cityFilter === 'all'
    ? Object.entries(cities||{})
    : Object.entries(cities||{}).filter(([c]) => c === cityFilter);
  return entries.map(([city,{p,t}]) => `
    <div class="city-row">
      <span class="city-tag city-${CITY_CLASS[city]}">${city}</span>
      <span class="city-price">${fmt(p)}</span>
      <span class="city-tat">${escHtml(t)}</span>
    </div>`).join('');
}

function cardHTML(item, i) {
  const isTest = item.type === 'Test';
  const hasCities = Object.keys(item.cities||{}).length > 0;
  const minP = minPrice(item);
  const paramCount = item.params ? item.params.length : (item.subs||[]).reduce((a,s)=>a+s.params.length,0);
  const g = genderLabel(item.gender||'both');

  const priceBlock = minP
    ? `<div class="card-price">
        <div class="price-from">${hasCities && Object.keys(item.cities).length>1 ? 'From' : ''}</div>
        <div class="price-val"><span class="price-sym">₹</span>${minP.toLocaleString('en-IN')}</div>
       </div>`
    : '';

  const cityMeta = hasCities
    ? `<span class="meta-chip">${cityPills(item.cities)}</span>`
    : (item.tats&&item.tats.length ? `<span class="meta-chip" style="color:var(--text-3)">TAT: ${escHtml(item.tats[0])}</span>` : '');

  const paramsSection = isTest
    ? `<div class="body-section">
        <div class="body-label">Parameters (${(item.params||[]).length})</div>
        <div class="params-list">${(item.params||[]).map(p=>`<div class="param-item">${escHtml(p)}</div>`).join('')||'<div class="param-item" style="color:var(--text-3)">—</div>'}</div>
       </div>`
    : `<div class="body-section">
        <div class="body-label">Includes (${(item.subs||[]).length} sub-tests, ${paramCount} params)</div>
        <div class="subtests-list">${(item.subs||[]).map(s=>`
          <div><div class="subtest-name">${escHtml(s.name)}</div>
          <div class="subtest-params">${s.params.map(p=>`<span class="sparam">${escHtml(p)}</span>`).join('')}</div></div>`).join('')}
        </div>
       </div>`;

  const pricingSection = hasCities
    ? `<div class="body-section">
        <div class="body-label">Pricing by City</div>
        <div class="city-table">${cityTableHTML(item.cities)}</div>
       </div>`
    : (item.price
        ? `<div class="body-section">
            <div class="body-label">Price</div>
            <div class="city-table"><div class="city-row"><span class="city-price">${fmt(item.price)}</span>${item.tats?`<span class="city-tat">${escHtml(item.tats[0]||'')}</span>`:''}</div></div>
           </div>`
        : '');

  return `
  <div class="card" data-i="${i}" style="animation-delay:${Math.min(i*0.025,0.3)}s">
    <div class="card-face" onclick="toggleCard(${i})">
      <span class="type-badge ${isTest?'badge-test':'badge-pkg'}">${isTest?'Test':'Package'}</span>
      <div class="card-main">
        <div class="card-name">${hl(item.name, query)}</div>
        <div class="card-meta">${cityMeta}<span class="meta-chip" style="color:var(--text-3)">${paramCount} param${paramCount!==1?'s':''}</span></div>
      </div>
      <div class="card-right">
        ${priceBlock}
        <div class="card-chevron">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
        </div>
      </div>
    </div>
    <div class="card-body">
      <div class="body-grid">${paramsSection}${pricingSection}</div>
      <div class="meta-row">
        <div class="meta-item"><span class="meta-dot" style="background:${(item.fast||'No')==='Yes'?'#F59E0B':'#22C55E'}"></span>Fasting: ${item.fast||'No'}</div>
        <div class="meta-item"><span class="meta-dot" style="background:${g.c}"></span>${g.l}</div>
      </div>
    </div>
  </div>`;
}

// ── TOGGLE ────────────────────────────────────────────────────────────────
function toggleCard(i) {
  document.querySelector(`.card[data-i="${i}"]`)?.classList.toggle('expanded');
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  const filtered = getFiltered();
  const grid = document.getElementById('resultsGrid');
  const empty = document.getElementById('emptyState');

  document.getElementById('statTests').textContent = DATA.filter(d=>d.type==='Test').length;
  document.getElementById('statPkgs').textContent  = DATA.filter(d=>d.type==='Package').length;
  document.getElementById('resultCount').textContent =
    filtered.length < DATA.length ? `${filtered.length} result${filtered.length!==1?'s':''} shown` : `${DATA.length} entries`;

  if (!filtered.length) { grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = filtered.map((item,i) => cardHTML(item,i)).join('');
}

function showLoading() {
  document.getElementById('loadingState').style.display = 'flex';
  document.getElementById('errorState').style.display   = 'none';
  document.getElementById('resultsGrid').style.display  = 'none';
  document.getElementById('emptyState').style.display   = 'none';
}
function hideLoading() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('resultsGrid').style.display  = 'flex';
}
function showError(msg) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('resultsGrid').style.display  = 'none';
  document.getElementById('errorState').style.display   = 'flex';
  document.getElementById('errorMsg').textContent = msg;
}

// ── LOAD & REFRESH ────────────────────────────────────────────────────────
async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  showLoading();
  try {
    DATA = await loadData();
    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      `Updated ${now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}`;
    hideLoading();
    render();
  } catch(e) {
    showError(e.message ||
      'Could not reach Google Sheets. Make sure the sheet is shared as "Anyone with the link can view" and try again.');
  } finally {
    btn.classList.remove('spinning');
  }
}

// ── EVENTS ────────────────────────────────────────────────────────────────
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
let debounce;
searchInput.addEventListener('input', e => {
  query = e.target.value;
  searchClear.classList.toggle('visible', query.length>0);
  clearTimeout(debounce);
  debounce = setTimeout(render, 120);
});
searchClear.addEventListener('click', () => {
  query=''; searchInput.value=''; searchClear.classList.remove('visible'); render(); searchInput.focus();
});
document.querySelectorAll('[data-type]').forEach(btn => btn.addEventListener('click', () => {
  typeFilter = btn.dataset.type;
  document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}));
document.querySelectorAll('[data-city]').forEach(btn => btn.addEventListener('click', () => {
  cityFilter = btn.dataset.city;
  document.querySelectorAll('[data-city]').forEach(b => {
    b.classList.remove('active','active-blr','active-del','active-noi','active-hyd','active-mum');
  });
  cityFilter==='all' ? btn.classList.add('active') : btn.classList.add('active-'+btn.dataset.cls);
  render();
}));
const scrollTopBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', () => scrollTopBtn.classList.toggle('visible', window.scrollY>400));
scrollTopBtn.addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));

// ── INIT ─────────────────────────────────────────────────────────────────
refreshData();
</script>
</body>
</html>
